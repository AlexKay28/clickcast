name: release

on:
  push:
    tags:
      - 'v*'

# Top-level: read-only. Individual jobs elevate for OIDC / release creation.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Build the sdist + wheel and verify the tag matches pyproject
  # ------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      prerelease: ${{ steps.check.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Verify tag matches pyproject.toml version
        id: check
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/v}"
          PYPROJ=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG"
          echo "pyproject=$PYPROJ"
          if [ "$TAG" != "$PYPROJ" ]; then
            echo "::error::tag v$TAG does not match pyproject.toml version $PYPROJ — bump one to match the other"
            exit 1
          fi
          # PEP 440 pre/dev release markers
          if [[ "$TAG" =~ (a|b|rc|\.dev|\.post) ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - run: pip install --upgrade build
      - run: python -m build

      - name: List built artifacts
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ------------------------------------------------------------------
  # Publish to TestPyPI (always, for every tag)
  # ------------------------------------------------------------------
  test-release:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: test-release
      url: https://test.pypi.org/project/clickcast/
    permissions:
      id-token: write   # for PyPI Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ------------------------------------------------------------------
  # Smoke-install from TestPyPI on the full support matrix
  # ------------------------------------------------------------------
  smoke-test:
    needs: [build, test-release]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Wait for TestPyPI index to catch up
        # TestPyPI's simple index can take up to ~30s to reflect a new upload.
        run: sleep 30

      - name: Install from TestPyPI
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "clickcast==${VERSION}"

      - name: Verify CLI runs
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          got=$(clickcast --version)
          if [ "$got" != "$VERSION" ]; then
            echo "::error::clickcast --version returned '$got', expected '$VERSION'"
            exit 1
          fi
          clickcast --help > /dev/null

  # ------------------------------------------------------------------
  # Publish to PyPI (only for non-prerelease tags)
  # ------------------------------------------------------------------
  release:
    needs: [build, smoke-test]
    if: needs.build.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/clickcast/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ------------------------------------------------------------------
  # Cut a GitHub release with auto-generated notes + attached artifacts
  # ------------------------------------------------------------------
  gh-release:
    needs: [build, release]
    if: needs.build.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --generate-notes \
            --title "$TAG" \
            dist/*.whl dist/*.tar.gz
