name: demo

on:
  workflow_dispatch:
    inputs:
      url:
        description: URL to record
        default: https://worldsight-weld.vercel.app/
        required: true
      viewport:
        description: Viewport (WxH)
        default: 1280x800
        required: true
      fps:
        description: Frames per second
        default: "12"
        required: true
      max-clicks:
        description: Max discovered elements to click
        default: "3"
        required: true
      initial-wait:
        description: Seconds to hold after networkidle before first click
        default: "4"
        required: true

permissions:
  contents: read

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Explicit token so `git push` below uses the GITHUB_TOKEN + our
          # per-job contents:write permission, not any long-lived credential.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -e ".[dev]"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-Linux-${{ hashFiles('pyproject.toml') }}

      - name: Install Playwright chromium
        run: playwright install --with-deps chromium

      - name: Generate demo GIF
        run: |
          python scripts/generate_demo.py \
            --url "${{ inputs.url }}" \
            --viewport "${{ inputs.viewport }}" \
            --fps "${{ inputs.fps }}" \
            --max-clicks "${{ inputs['max-clicks'] }}" \
            --initial-wait "${{ inputs['initial-wait'] }}" \
            --keep-frames debug-frames \
            --out docs/demo.gif \
            --verbose

      - name: Show output size
        run: ls -lh docs/demo.gif

      - name: Upload debug frames
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: demo-frames
          path: debug-frames/
          retention-days: 7

      - name: Commit regenerated GIF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/demo.gif
          if git diff --staged --quiet; then
            echo "docs/demo.gif is unchanged; nothing to commit."
          else
            git commit -m "chore(demo): refresh docs/demo.gif via demo workflow"
            git push
          fi
